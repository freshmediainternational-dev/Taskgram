<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskgram - AdminLogin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 400;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .admin-login-box h2 {
            font-size: 24px;
            color: #6c63ff;
            margin-bottom: 5px;
        }

        .admin-login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .form-group input {
            display: block;
            width: 100%;
        }
    </style>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskgram - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        /* NAV */
        nav {
            background: #6c63ff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: white;
            font-size: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* LAYOUT */
        .admin-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            flex: 1;
            min-width: 150px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 28px;
            font-weight: 700;
            color: #6c63ff;
        }

        /* TABLES */
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 20px;
            color: #6c63ff;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f4f6f9;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            color: #666;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green {
            background: #e6fff4;
            color: #48c774;
        }

        /* ADD TASK FORM */
        .add-task-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .add-task-form input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            min-width: 150px;
        }

        .add-task-form input:focus {
            border-color: #6c63ff;
        }

        .btn-add {
            background: #6c63ff;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            padding: 5px 15px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <h1>Taskgram Admin</h1>
        <a href="#" onclick="logout()">Logout</a>
    </nav>

    <div class="admin-container">

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="total-users">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <p id="total-tasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed Tasks</h3>
                <p id="completed-tasks">0</p>
            </div>
        </div>

        <!-- USERS TABLE -->
        <div class="section">
            <h2>Registered Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Balance</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr><td colspan="6">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- TASKS TABLE -->
        <div class="section">
            <h2>Manage Tasks</h2>
            <div class="add-task-form">
                <input type="text" id="task-title" placeholder="Task title">
                <input type="text" id="task-desc" placeholder="Description">
                <input type="number" id="task-reward" placeholder="Reward (₦)">
                <input type="text" id="task-link" placeholder="Link">
                <button class="btn-add" onclick="addTask()">Add Task</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Reward</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tasks-table">
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const API = 'https://taskgram.infinityfreeapp.com/api';

        // Load all data
        async function loadData(){
            // Load users
            const usersRes = await fetch(`${API}/admin_users.php`);
            const usersData = await usersRes.json();

            if(usersData.status === 'success'){
                document.getElementById('total-users').textContent = usersData.users.length;
                let usersHTML = '';
                usersData.users.forEach(user => {
                    usersHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.full_name}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td>
                        <td>₦${user.balance}</td>
                        <td>${user.created_at}</td>
                    </tr>`;
                });
                document.getElementById('users-table').innerHTML = usersHTML;
            }

            // Load tasks
            const tasksRes = await fetch(`${API}/admin_tasks.php`);
            const tasksData = await tasksRes.json();

            if(tasksData.status === 'success'){
                document.getElementById('total-tasks').textContent = tasksData.tasks.length;
                let tasksHTML = '';
                tasksData.tasks.forEach(task => {
                    tasksHTML += `
                    <tr>
                        <td>${task.id}</td>
                        <td>${task.title}</td>
                        <td>₦${task.reward}</td>
                        <td><button class="btn-delete" onclick="deleteTask(${task.id})">Delete</button></td>
                    </tr>`;
                });
                document.getElementById('tasks-table').innerHTML = tasksHTML;
            }
        }

        // Add task
        async function addTask(){
            const title = document.getElementById('task-title').value;
            const description = document.getElementById('task-desc').value;
            const reward = document.getElementById('task-reward').value;
            const link = document.getElementById('task-link').value;

            if(!title || !description || !reward || !link){
                alert('Please fill in all fields');
                return;
            }

            const response = await fetch(`${API}/admin_tasks.php`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, description, reward, link})
            });

            const result = await response.json();
            if(result.status === 'success'){
                alert('Task added successfully!');
                loadData();
            }
        }

        // Delete task
        async function deleteTask(task_id){
            if(!confirm('Are you sure you want to delete this task?')) return;

            const response = await fetch(`${API}/admin_tasks.php`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_id})
            });

            const result = await response.json();
            if(result.status === 'success'){
                alert('Task deleted!');
                loadData();
            }
        }

        function logout(){
            localStorage.removeItem('admin');
            window.location.href = '../index.html';
        }

        loadData();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Taskgram - Dashboard</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>

        <!--NAVIGATION-->
        <nav>
            <div class="logo">Taskgram</div>
            <div class="nav-links">
                <a href="tasks.html">Task</a>
                <a href="#" class="btn-signup">Logout</a>
            </div>
        </nav>

        <!--DASHBOARD-->
        <section class="Dashboard">

            <!--WELCOME-->
            <div class="welcome-box">
                <h2>Welcome back, User!</h2>
                <p>Complete tasks and earn money daily</p>
            </div>

            <!--STATS-->
            <div class="stats">
            <div class="stat-card">
                <h3>Total Earning</h3>
                <p class="amount">N0.00</p>
            </div>
            <div class="stat-card">
                <h3>Tasks Completed</h3>
                <p class="amount">0</p>
            </div>
            <div class="stat-card">
                <h3>Available Tasks</h3>
                <p class="amount">12</p>
            </div>
            </div>

            <!--WITHDRAW BUTTON-->
            <div class="Withdraw-section">
                <button class="btn Withdraw">Withdraw Earnings</button>
            </div>

        </section>
        
    </body>
</html>

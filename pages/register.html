<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Taskgram - Register</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>

        <!--NAVIGATION-->
        <nav>
            <div class="logo">Taskgram</div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
            </div>
        </nav>

        <!--REGISTER FORM-->
        <section class="auth-section">
            <div class="auth-box">
                <h2> Create Your Account</h2>
                <p class="auth-sub"> join Taskgram and start earning today</p>

                <div class="form-group">
                    <label> Full name</label>
                    <input type="text" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm your password">
            </div>

            <button class="btn-auth">Create Account</button>

            <p class="auth-switch">Already have an account?
                <a href="login.html">Login here</a>
            </p>
            </div>
        </section>
<script>
document.querySelector('.btn-auth').addEventListener('click', async function(){
    const full_name = document.querySelectorAll('input')[0].value;
    const email = document.querySelectorAll('input')[1].value;
    const phone = document.querySelectorAll('input')[2].value;
    const password = document.querySelectorAll('input')[3].value;
    const confirm_password = document.querySelectorAll('input')[4].value;

    if(!full_name || !email || !phone || !password || !confirm_password){
        alert('Please fill in all fields');
        return;
    }

    const response = await fetch('https://taskgram.infinityfreeapp.com/api/register.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({full_name, email, phone, password, confirm_password})
    });

    const result = await response.json();

    if(result.status === 'success'){
        alert('Registration successful! Please login.');
        window.location.href = 'login.html';
    } else {
        alert(result.message);
    }
});
</script>
    </body>
</html>

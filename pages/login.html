<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Taskgram - Login</title>
        <link rel="stylesheet" href="../css/style.css">
        <style>
            .auth-section {
                height: 100vh !important;
                display: flex !important;
                justify-content:  center !important;
                align-items: center !important;
                padding: 20px !important;
            }
        </style>
    </head>
    <body>

        <nav>
            <div class="logo">Taskgram</div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="register.html" class="btn-signup">Sign Up</a>
            </div>
        </nav>

       <section class="auth-section">
    <div class="auth-box">
        <h2>Welcome Back!</h2>
        <p class="auth-sub">Login to your Taskgram account</p>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password">
        </div>
        <button class="btn-auth">Login</button>
        <p class="auth-switch">Don't have an account?
            <a href="register.html">Register here</a>
        </p>
    </div>
    </section>

    <script>
document.querySelector('.btn-auth').addEventListener('click', async function(){
    const email = document.querySelectorAll('input')[0].value;
    const password = document.querySelectorAll('input')[1].value;

    if(!email || !password){
        alert('Please fill in all fields');
        return;
    }

    const response = await fetch('https://taskgram.infinityfreeapp.com/api/login.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
    });

    const result = await response.json();

    if(result.status === 'success'){
        localStorage.setItem('user', JSON.stringify(result.user));
        window.location.href = 'dashboard.html';
    } else {
        alert(result.message);
    }
});
</script>
    </body>
    </html>

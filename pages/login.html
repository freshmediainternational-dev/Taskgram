<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Taskgram - Login</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>

        <nav>
            <div class="logo">Taskgram</div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="register.html" class="btn-signup">Sign Up</a>
            </div>
        </nav>

        <section class="auth-section"></section>
        <div class="auth-box">
            <h2>Welcome Back !</h2>
            <p class="auth-sub">Login to your Taskgram acccount</p>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password">
        </div>
        <button class="btn-auth">Login</button>
        <p class="auth-switch">Don't have an account?
            <a href="register.html">Register here</a>
        </p>
        </div>
    </section>

    </body>
    </html>

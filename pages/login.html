<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Taskgram - Login</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>

        <!--NAVIGATION-->
        <nav>
            <div class="logo">Taskgram</div>
            <div class="nav-links">
                <a href="../index.html" class="btn-signup">Sign UP</a>
            </div>
        </nav>

        <!--LOGIN FORM-->
        <section class="auth-section">
            <div class="auth-box">
                <h2> Welcome Back</h2>
                <p class="auth-sub">Login to your Taskgram acount</p>
                
                <div class="form-group"></div>
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn-auth">Login</button>
            
            <p class="auth-switch">Don't have an account?</p>
            <a href="register.html">Register here</a>
        </p>
    </div>
        </section>
        
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskgram - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .code-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input input {
            width: 50px;
            height: 55px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        .code-input input:focus {
            border-color: #6c63ff;
        }

        .resend-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        .resend-link a {
            color: #6c63ff;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Task<span style="color:#6c63ff">gram</span></div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="register.html" class="btn-signup">Sign Up</a>
        </div>
    </nav>

    <!-- STEP 1: LOGIN FORM -->
    <section class="auth-section" id="step1">
        <div class="auth-box">
            <h2>Welcome Back!</h2>
            <p class="auth-sub">Login to your Taskgram account</p>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button class="btn-auth" onclick="loginUser()">Login</button>
            <p class="auth-switch">Don't have an account?
                <a href="register.html">Register here</a>
            </p>
        </div>
    </section>

    <!-- STEP 2: EMAIL VERIFICATION -->
    <section class="auth-section" id="step2" style="display:none;">
        <div class="auth-box">
            <h2>Check Your Email</h2>
            <p class="auth-sub" id="verify-message">We sent a 6-digit code to your email</p>

            <div class="code-input">
                <input type="text" maxlength="1" id="c1" oninput="moveNext(this, 'c2')">
                <input type="text" maxlength="1" id="c2" oninput="moveNext(this, 'c3')">
                <input type="text" maxlength="1" id="c3" oninput="moveNext(this, 'c4')">
                <input type="text" maxlength="1" id="c4" oninput="moveNext(this, 'c5')">
                <input type="text" maxlength="1" id="c5" oninput="moveNext(this, 'c6')">
                <input type="text" maxlength="1" id="c6" oninput="moveNext(this, null)">
            </div>

            <button class="btn-auth" onclick="verifyCode()">Verify & Login</button>

            <p class="resend-link">
                Didn't receive the code? 
                <a onclick="resendCode()">Resend Code</a>
            </p>

            <p style="text-align:center; margin-top:10px;">
                <a href="#" onclick="goBack()" style="color:#888; font-size:13px;">← Go back</a>
            </p>
        </div>
    </section>

    <script>
        let userEmail = '';
        let verifyType = '';

        function moveNext(current, nextId){
            if(current.value.length === 1 && nextId){
                document.getElementById(nextId).focus();
            }
        }

        async function loginUser(){
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password){
                alert('Please fill in all fields');
                return;
            }

            const response = await fetch('https://taskgram.infinityfreeapp.com/api/login.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });

            const result = await response.json();

            if(result.status === '2fa_required'){
                userEmail = result.email;
                verifyType = '2fa';
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'flex';
                document.getElementById('verify-message').textContent = 'We sent a 6-digit code to ' + email;
            } else if(result.status === 'unverified'){
                userEmail = result.email;
                verifyType = 'registration';
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'flex';
                document.getElementById('verify-message').textContent = 'Your email is not verified. We sent a new code to ' + email;
                resendCode();
            } else {
                alert(result.message);
            }
        }

        async function verifyCode(){
            const code = document.getElementById('c1').value +
                        document.getElementById('c2').value +
                        document.getElementById('c3').value +
                        document.getElementById('c4').value +
                        document.getElementById('c5').value +
                        document.getElementById('c6').value;

            if(code.length !== 6){
                alert('Please enter the complete 6-digit code');
                return;
            }

            let url = '';
            if(verifyType === '2fa'){
                url = 'https://taskgram.infinityfreeapp.com/api/verify_login.php';
            } else {
                url = 'https://taskgram.infinityfreeapp.com/api/verify_email.php';
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: userEmail, code: code})
            });

            const result = await response.json();

            if(result.status === 'success'){
                if(verifyType === '2fa'){
                    localStorage.setItem('user', JSON.stringify(result.user));
                    if(result.user.account_type === 'advertiser'){
                        window.location.href = 'advertiser_dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert('Email verified! Please login.');
                    goBack();
                }
            } else {
                alert(result.message);
            }
        }

        async function resendCode(){
            const response = await fetch('https://taskgram.infinityfreeapp.com/api/resend_code.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: userEmail})
            });

            const result = await response.json();
            alert(result.message);
        }

        function goBack(){
            document.getElementById('step1').style.display = 'flex';
            document.getElementById('step2').style.display = 'none';
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskgram - Contact Us</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .contact-section {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .contact-hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .contact-hero h1 {
            font-size: 42px;
            color: #6c63ff;
            margin-bottom: 15px;
        }

        .contact-hero p {
            font-size: 18px;
            color: #888;
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .contact-info {
            flex: 1;
            min-width: 250px;
        }

        .contact-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .contact-card .icon {
            font-size: 30px;
        }

        .contact-card h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .contact-card p {
            font-size: 14px;
            color: #888;
        }

        .contact-form {
            flex: 1;
            min-width: 250px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .contact-form h2 {
            font-size: 24px;
            color: #6c63ff;
            margin-bottom: 25px;
        }

        .contact-form .form-group {
            margin-bottom: 18px;
        }

        .contact-form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .contact-form input,
        .contact-form textarea {
            display: block;
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: #6c63ff;
        }

        .contact-form textarea {
            height: 120px;
            resize: none;
        }

        .btn-send {
            display: block;
            width: 100%;
            padding: 14px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover {
            background: #574fd6;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Taskgram</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="login.html" class="btn-signup">Login</a>
        </div>
    </nav>

    <section class="contact-section">

        <div class="contact-hero">
            <h1>Contact Us</h1>
            <p>Have a question or need help? We're here for you. Send us a message and we'll respond within 24 hours.</p>
        </div>

        <div class="contact-grid">

            <!-- CONTACT INFO -->
            <div class="contact-info">
                <div class="contact-card">
                    <div class="icon">📧</div>
                    <div>
                        <h3>Email</h3>
                        <p>support@taskgram.com</p>
                    </div>
                </div>
                <div class="contact-card">
                    <div class="icon">📱</div>
                    <div>
                        <h3>WhatsApp</h3>
                        <p>+234 800 000 0000</p>
                    </div>
                </div>
                <div class="contact-card">
                    <div class="icon">✈️</div>
                    <div>
                        <h3>Telegram</h3>
                        <p>@taskgram</p>
                    </div>
                </div>
                <div class="contact-card">
                    <div class="icon">🕐</div>
                    <div>
                        <h3>Support Hours</h3>
                        <p>Monday - Friday, 9am - 6pm</p>
                    </div>
                </div>
            </div>

            <!-- CONTACT FORM -->
            <div class="contact-form">
                <h2>Send a Message</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" placeholder="What is this about?">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Type your message here..."></textarea>
                </div>
                <button class="btn-send">Send Message</button>
            </div>

        </div>

    </section>

</body>
</html>
